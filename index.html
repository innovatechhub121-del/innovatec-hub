<!DOCTYPE html>
<html>
<head>
  <title>Innovatec Hub</title>
</head>
<body style="font-family: Arial; padding: 20px;">

  <h1>Innovatec Hub 🛒</h1>

  <h2>Products</h2>

  <div id="products">Loading...</div>

  <script>
    fetch("https://YOUR_BACKEND_URL/products")
      .then(res => res.json())
      .then(data => {
        let html = "";
        data.forEach(p => {
          html += `<p>${p.name} - ₦${p.price}</p>`;
        });
        document.getElementById("products").innerHTML = html;
      });
  </script>

</body>
</html>
